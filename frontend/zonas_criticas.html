<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zonas Críticas | moviliDATA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside class="sidebar">
        <h2>🚗 moviliDATA</h2>
        <ul class="nav-links">
            <li><a href="index.html">📊 Dashboard Central</a></li>
            <li><a href="zonas_criticas.html" class="active">⚠️ Zonas Críticas</a></li>
            <li><a href="#">📈 Predicción</a></li>
            <li><a href="rutas.html">🌧️ Rutas Seguras</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header>
            <h1>Zonas Críticas de Accidentalidad</h1>
            <p style="color: var(--text-secondary)">Histórico y predicciones de riesgo (Módulo 1)</p>
        </header>
        
        <section class="dashboard-grid">
            <div class="card" style="grid-column: span 2;">
                <h3>Resultados de Predicción de Riesgo (Conectado a la API)</h3>
                <pre id="api-result" style="background: #0f172a; padding: 1rem; border-radius: 0.5rem; color: #10b981;">Cargando datos...</pre>
            </div>
        </section>
    </main>

    <script type="module">
        import { api } from './js/api.js';
        
        document.addEventListener('DOMContentLoaded', async () => {
            const result = await api.getZonasCriticas();
            document.getElementById('api-result').textContent = JSON.stringify(result, null, 2);
        });
    </script>
</body>
</html>
